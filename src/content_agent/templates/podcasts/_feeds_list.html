{% if feeds %}
<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="feeds-grid">
  {% for feed in feeds %}
  <div class="card bg-white border border-surface-200 rounded-xl p-5" id="podcast-card-{{ loop.index }}">
    <!-- Feed info -->
    <div class="mb-4 flex items-start justify-between gap-2">
      <div class="min-w-0">
        <h2 class="text-base font-semibold text-slate-800 mb-1">{{ feed.name }}</h2>
        <p class="mono text-xs text-slate-400 truncate" title="{{ feed.url }}">{{ feed.url }}</p>
      </div>
      <button
        hx-delete="/podcasts/{{ feed.name }}"
        hx-target="#podcast-card-{{ loop.index }}"
        hx-swap="outerHTML"
        hx-confirm="Delete '{{ feed.name }}' feed?"
        class="flex-shrink-0 p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
        title="Delete feed"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>

    <!-- Download form -->
    <form
      hx-post="/podcasts/{{ feed.name }}/download"
      hx-target="#result-{{ loop.index }}"
      hx-swap="innerHTML"
      hx-indicator="#spinner-{{ loop.index }}"
      class="flex items-center gap-2"
    >
      <div class="flex-1">
        <label class="block mono text-xs text-slate-400 tracking-wider mb-1">EPISODES</label>
        <input
          type="number"
          name="count"
          value="1"
          min="1"
          max="10"
          class="form-input w-full rounded-lg px-3 py-2 text-sm"
        />
      </div>
      <div class="pt-5">
        <button
          type="submit"
          class="flex items-center gap-1.5 px-4 py-2 bg-accent text-white text-sm font-medium rounded-lg hover:bg-accent-text transition-colors"
        >
          <span>Download</span>
          <span id="spinner-{{ loop.index }}" class="htmx-indicator">
            <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </span>
        </button>
      </div>
    </form>

    <!-- Result area -->
    <div id="result-{{ loop.index }}" class="mt-3"></div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="bg-white border border-surface-200 rounded-xl p-10 text-center">
  <div class="mono text-xs text-slate-400 tracking-wider mb-2">NO FEEDS</div>
  <p class="text-slate-500 text-sm">No podcast feeds yet. Add one above.</p>
</div>
{% endif %}
