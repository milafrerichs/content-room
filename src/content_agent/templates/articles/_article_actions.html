<div id="article-actions">
  {% if article['status'] in ('discovered', 'failed') %}
  <button
    hx-post="/articles/{{ article['id'] }}/summarize"
    hx-target="#article-actions"
    hx-swap="outerHTML"
    class="inline-flex items-center gap-2 px-5 py-2.5 bg-accent-light border border-accent/25 text-accent text-sm font-medium rounded-lg hover:bg-sky-100 transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
    Summarize
  </button>

  {% elif article['status'] == 'summarized' %}
  <div class="inline-flex items-center gap-3">
    {% if not article['read_at'] %}
    <button
      hx-post="/articles/{{ article['id'] }}/read"
      hx-swap="outerHTML"
      class="inline-flex items-center gap-2 px-5 py-2.5 bg-accent-light border border-accent/25 text-accent text-sm font-medium rounded-lg hover:bg-sky-100 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
      Mark as Read
    </button>
    {% endif %}

    <button
      hx-post="/articles/{{ article['id'] }}/summarize"
      hx-target="#article-actions"
      hx-swap="outerHTML"
      class="inline-flex items-center gap-2 px-5 py-2.5 bg-amber-50 border border-amber-200 text-amber-700 text-sm font-medium rounded-lg hover:bg-amber-100 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Re-summarize
    </button>
  </div>
  {% endif %}

  <!-- Archive / Unarchive -->
  {% if article['archived_at'] %}
  <button
    hx-post="/articles/{{ article['id'] }}/unarchive"
    class="inline-flex items-center gap-2 px-5 py-2.5 bg-surface-100 border border-surface-200 text-slate-500 text-sm font-medium rounded-lg hover:bg-surface-200 transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M3 10l4-6h10l4 6M3 10v8a2 2 0 002 2h14a2 2 0 002-2v-8M10 14l2-2 2 2"/>
    </svg>
    Unarchive
  </button>
  {% else %}
  <button
    hx-post="/articles/{{ article['id'] }}/archive"
    class="inline-flex items-center gap-2 px-5 py-2.5 bg-surface-100 border border-surface-200 text-slate-500 text-sm font-medium rounded-lg hover:bg-surface-200 transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
    </svg>
    Archive
  </button>
  {% endif %}
</div>
