<div id="article-actions">
  <div class="inline-flex items-center gap-3">
    <span class="mono text-xs bg-amber-50 border border-amber-200 text-amber-700 rounded px-2 py-0.5">summarizing...</span>
    <button disabled class="inline-flex items-center gap-2 px-5 py-2.5 bg-slate-100 border border-slate-200 text-slate-400 text-sm font-medium rounded-lg cursor-not-allowed">
      <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Summarizing...
    </button>
  </div>
  <span
    hx-get="/articles/{{ article['id'] }}/actions"
    hx-trigger="every 5s"
    hx-target="#article-actions"
    hx-swap="outerHTML">
  </span>
</div>
