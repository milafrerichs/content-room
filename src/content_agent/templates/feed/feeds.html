{% extends "base.html" %}
{% block title %}Manage Feeds{% endblock %}

{% block content %}
<div class="p-8 fade-in">

  <!-- Back link -->
  <a href="/feed" class="inline-flex items-center gap-1.5 mono text-xs text-slate-400 hover:text-accent transition-colors mb-6">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to Feed
  </a>

  <!-- Page header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <div class="mono text-xs text-accent tracking-widest mb-1">MANAGEMENT</div>
      <h1 class="text-2xl font-semibold text-slate-800">Feeds</h1>
    </div>
    <button
      hx-post="/feeds/sync"
      hx-target="#feeds-container"
      hx-swap="innerHTML"
      class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white border border-surface-200 text-slate-500 text-sm rounded-lg hover:border-surface-300 hover:text-slate-700 transition-colors mono text-xs"
    >
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Sync from Config
    </button>
  </div>

  <!-- Add podcast feed -->
  <div class="bg-white border border-surface-200 rounded-xl p-5 mb-4">
    <div class="mono text-xs text-slate-400 tracking-wider mb-3">ADD PODCAST FEED</div>
    <form
      hx-post="/feeds/podcast/create"
      hx-target="#feeds-container"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) this.reset()"
      class="flex items-end gap-3"
    >
      <div class="flex-1">
        <label class="block mono text-xs text-slate-400 tracking-wider mb-1">NAME</label>
        <input type="text" name="name" placeholder="My Podcast" required
               class="form-input w-full rounded-lg px-3 py-2 text-sm" />
      </div>
      <div class="flex-[2]">
        <label class="block mono text-xs text-slate-400 tracking-wider mb-1">RSS URL</label>
        <input type="url" name="url" placeholder="https://feeds.example.com/podcast.rss" required
               class="form-input w-full rounded-lg px-3 py-2 text-sm" />
      </div>
      <div class="w-32">
        <label class="block mono text-xs text-slate-400 tracking-wider mb-1">CATEGORY</label>
        <input type="text" name="category" placeholder="e.g. Tech"
               class="form-input w-full rounded-lg px-3 py-2 text-sm" />
      </div>
      <button type="submit"
              class="flex items-center gap-1.5 px-4 py-2 bg-accent text-white text-sm font-medium rounded-lg hover:bg-accent-text transition-colors whitespace-nowrap">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add
      </button>
    </form>
  </div>

  <!-- Add article feed -->
  <div class="bg-white border border-surface-200 rounded-xl p-5 mb-6">
    <div class="mono text-xs text-slate-400 tracking-wider mb-3">ADD ARTICLE FEED</div>
    <form
      hx-post="/feeds/article/create"
      hx-target="#feeds-container"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) this.reset()"
      class="flex items-end gap-3"
    >
      <div class="flex-[2]">
        <label class="block mono text-xs text-slate-400 tracking-wider mb-1">WEBSITE OR RSS URL</label>
        <input type="url" name="url" placeholder="https://blog.example.com" required
               class="form-input w-full rounded-lg px-3 py-2 text-sm" />
      </div>
      <div class="flex-1">
        <label class="block mono text-xs text-slate-400 tracking-wider mb-1">NAME <span class="text-slate-300">(optional)</span></label>
        <input type="text" name="name" placeholder="Auto-detected from feed"
               class="form-input w-full rounded-lg px-3 py-2 text-sm" />
      </div>
      <div class="w-32">
        <label class="block mono text-xs text-slate-400 tracking-wider mb-1">CATEGORY</label>
        <input type="text" name="category" placeholder="e.g. Health"
               class="form-input w-full rounded-lg px-3 py-2 text-sm" />
      </div>
      <button type="submit"
              class="flex items-center gap-1.5 px-4 py-2 bg-accent text-white text-sm font-medium rounded-lg hover:bg-accent-text transition-colors whitespace-nowrap">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add
      </button>
    </form>
    <div id="article-feed-error"></div>
  </div>

  <!-- Feeds list -->
  <div id="feeds-container">
    {% include "feed/_feeds_list.html" %}
  </div>

</div>
{% endblock %}
