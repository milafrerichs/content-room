databases:
  - name: content-agent-db
    plan: free
    databaseName: content_agent

services:
  - type: web
    name: content-agent
    runtime: python
    buildCommand: pip install -e .
    startCommand: gunicorn asgi:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --max-requests 1000 --max-requests-jitter 50 --graceful-timeout 30 --preload
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CONFIG_PATH
        value: config.yaml
      - key: DATABASE_URL
        fromDatabase:
          name: content-agent-db
          property: connectionString
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
