services:
  - type: web
    name: content-agent
    runtime: python
    buildCommand: pip install -e .
    startCommand: gunicorn asgi:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CONFIG_PATH
        value: config.yaml
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  - type: cron
    name: daily-digest
    runtime: python
    schedule: "0 7 * * *"
    buildCommand: pip install -e .
    startCommand: python run_digest.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: CONFIG_PATH
        value: config.yaml
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
