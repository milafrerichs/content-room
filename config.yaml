# Podcast feeds
podcast_feeds:
  - name: "Huberman Lab"
    url: "https://feeds.megaphone.fm/hubermanlab"
  - name: "Feel Better Live More"
    url: "https://feeds.megaphone.fm/feelbetterlivemore"
  - name: "bike_shed"
    url: "https://bikeshed.thoughtbot.com/rss"
  - name: "on_rails"
    url: "https://feeds.buzzsprout.com/2462975.rss"
  - name: "remote_ruby"
    url: "https://feeds.buzzsprout.com/2260490.rss"
  - name: "ten_percent"
    url: "https://feeds.libsyn.com/570160/rss"

# Article feeds
article_feeds:
  - name: "Simon Willison"
    url: "https://simonwillison.net/atom/everything/"

# Podcast directories
download_dir: "~/news/podcasts/audio"
transcript_dir: "~/news/podcasts/transcripts"
podcast_summary_dir: "~/news/podcasts/summaries"

# Article directories
article_summary_dir: "~/news/articles/summaries"

db_path: "~/news/content_agent.db"
whisper_model: "base"
max_episodes_per_day: 5
max_articles_per_day: 20

# macOS integration
notifications_enabled: true
speak_results: false
show_completion_alert: false
save_to_notes: false
notes_folder: "Podcast Summaries"

# LLM configuration
# llm_provider: "ollama" (default, local) or "anthropic" (cloud)
# llm_model: Ollama model name, used when provider=ollama
# anthropic_model: Anthropic model name, used when provider=anthropic
llm_provider: "openrouter"
llm_model: "ministral-3:8b"
anthropic_model: "claude-haiku-4-5"
# ollama_base_url: "http://localhost:11434/v1"  # Uncomment to customize Ollama URL
# llm_provider: "openrouter"  # Uses OPENROUTER_API_KEY env var
openrouter_model: "google/gemini-3.1-flash-lite-preview" #anthropic/claude-haiku-4-5"  # See openrouter.ai/models for options

# Daily digest configuration
digest:
  enabled: false
  slack_webhook_url: ""  # or set SLACK_WEBHOOK_URL env var
