# Podcast feeds
podcast_feeds:
  - name: "Huberman Lab"
    url: "https://feeds.megaphone.fm/hubermanlab"
  - name: "Feel Better Live More"
    url: "https://feeds.megaphone.fm/feelbetterlivemore"
  - name: "bike_shed"
    url: "https://bikeshed.thoughtbot.com/rss"
  - name: "on_rails"
    url: "https://feeds.buzzsprout.com/2462975.rss"
  - name: "remote_ruby"
    url: "https://feeds.buzzsprout.com/2260490.rss"
  - name: "ten_percent"
    url: "https://feeds.libsyn.com/570160/rss"

# Article feeds
article_feeds:
  - name: "Hacker News"
    url: "https://hnrss.org/frontpage"

# Podcast directories
download_dir: "~/Documents/news/podcasts/audio"
transcript_dir: "~/Documents/news/podcasts/transcripts"
podcast_summary_dir: "~/Documents/news/podcasts/summaries"

# Article directories
article_summary_dir: "~/Documents/news/articles/summaries"

db_path: "~/Documents/news/content_agent.db"
whisper_model: "base"
max_episodes_per_day: 5
max_articles_per_day: 20

# macOS integration
notifications_enabled: true
speak_results: false
show_completion_alert: false
save_to_notes: false
notes_folder: "Podcast Summaries"

# LLM configuration
# llm_provider: "ollama" (default, local) or "anthropic" (cloud)
# llm_model: Ollama model name, used when provider=ollama
# anthropic_model: Anthropic model name, used when provider=anthropic
llm_provider: "ollama"
llm_model: "llama3.2"
anthropic_model: "claude-haiku-4-5"
# ollama_base_url: "http://localhost:11434/v1"  # Uncomment to customize Ollama URL
